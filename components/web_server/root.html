<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedLink Dongle Setup</title>
  <style>
    .signal-icon {
      display: flex;
      align-items: center;
      transition: transform 0.3s ease;
    }

    .wifi-item:hover .signal-icon {
      transform: scale(1.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0027a2 0%, #0056ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      padding: clamp(16px, 4vw, 40px);
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background elements */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 80%,
          rgba(120, 119, 198, 0.3) 0%,
          transparent 50%),
        radial-gradient(circle at 80% 20%,
          rgba(255, 255, 255, 0.1) 0%,
          transparent 50%),
        radial-gradient(circle at 40% 40%,
          rgba(120, 119, 198, 0.2) 0%,
          transparent 50%);
      animation: backgroundMove 20s ease-in-out infinite;
      z-index: -1;
    }

    @keyframes backgroundMove {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }
    }

    .container {
      max-width: min(480px, 94vw);
      width: 100%;
      margin: auto;
      background: rgb(255, 255, 255);
      backdrop-filter: blur(20px);
      border-radius: clamp(16px, 3vw, 24px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      padding: clamp(24px, 5vw, 40px) clamp(18px, 5vw, 30px);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
      position: relative;
      overflow: hidden;
      transform: translateY(0);
      animation: containerFloat 6s ease-in-out infinite;
    }

    @keyframes containerFloat {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .container::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent);
      transform: rotate(45deg);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-100%) translateY(-100%) rotate(45deg);
      }

      100% {
        transform: translateX(100%) translateY(100%) rotate(45deg);
      }
    }

    h1 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      background: linear-gradient(135deg, #0027a2, #0056ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: clamp(10px, 3vw, 20px);
      margin-bottom: clamp(20px, 5vw, 35px);
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    /* Network Type Toggle Styles */
    .network-type-toggle {
      display: flex;
      margin-bottom: 20px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .network-type-button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
      color: #0027a2;
      background: rgba(0, 39, 162, 0.1);
      border: 2px solid rgba(0, 39, 162, 0.2);
    }

    .network-type-button:first-child {
      border-right: 1px solid rgba(0, 39, 162, 0.2);
    }

    .network-type-button.active {
      background: linear-gradient(135deg, #0027a2, #0056ff);
      color: white;
      box-shadow: 0 2px 8px rgba(0, 39, 162, 0.3);
    }

    .network-type-button:hover:not(.active) {
      background: rgba(0, 39, 162, 0.2);
    }

    /* IP Mode Toggle Styles */
    .ip-mode-toggle {
      display: flex;
      margin-bottom: 25px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .ip-mode-button {
      flex: 1;
      padding: 8px 16px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
      color: #0027a2;
      background: rgba(0, 39, 162, 0.1);
      border: 2px solid rgba(0, 39, 162, 0.2);
    }

    .ip-mode-button:first-child {
      border-right: 1px solid rgba(0, 39, 162, 0.2);
    }

    .ip-mode-button.active {
      background: linear-gradient(135deg, #0027a2, #10B981);
      color: white;
      box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
    }

    .ip-mode-button:hover:not(.active) {
      background: rgba(0, 39, 162, 0.2);
    }

    .wifi-section {
      margin-bottom: 25px;
    }

    .scan-button {
      width: 100%;
      background: linear-gradient(135deg, #0027a2, #0056ff);
      color: white;
      padding: 15px 20px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      margin-bottom: 20px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0, 39, 162, 0.4);
      position: relative;
      overflow: hidden;
    }

    .scan-button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent);
      transition: all 0.5s ease;
    }

    .scan-button:hover::before {
      left: 100%;
    }

    .scan-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 39, 162, 0.5);
    }

    .scan-button:active {
      transform: translateY(0);
    }

    .scan-button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .wifi-list {
      max-height: min(250px, 40vh);
      overflow-y: auto;
      background: rgba(249, 250, 251, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: clamp(10px, 3vw, 15px);
      margin-bottom: 20px;
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .wifi-list::-webkit-scrollbar {
      width: 6px;
    }

    .wifi-list::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 3px;
    }

    .wifi-list::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #0027a2, #0056ff);
      border-radius: 3px;
    }

    .wifi-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .wifi-item:hover {
      background: rgba(0, 39, 162, 0.1);
      transform: translateX(5px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .wifi-item:last-child {
      margin-bottom: 0;
    }

    .wifi-name {
      font-weight: 600;
      color: #374151;
    }

    .signal-icon {
      font-size: 18px;
      display: flex;
      align-items: center;
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .form-container {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-group {
      text-align: left;
    }

    .password-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-toggle {
      position: absolute;
      right: 15px;
      cursor: pointer;
      color: #6b7280;
      display: flex;
      align-items: center;
      transition: color 0.3s ease;
    }

    .password-toggle:hover {
      color: #0027a2;
    }

    .password-container input {
      padding-right: 45px !important;
    }

    .server-tooltip {
      position: relative;
      display: inline-flex;
      align-items: center;
      margin-left: 4px;
      cursor: help;
      color: #6b7280;
      vertical-align: middle;
      transition: color 0.3s ease;
    }

    .server-tooltip .tooltiptext {
      visibility: hidden;
      width: min(260px, 80vw);
      background-color: rgba(31, 41, 55, 0.95);
      color: #fff;
      text-align: left;
      border-radius: 8px;
      padding: 12px;
      font-size: clamp(11px, 3vw, 13px);
      line-height: 1.5;
      font-weight: normal;
      position: absolute;
      z-index: 10;
      bottom: 150%;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      transition: opacity 0.3s, bottom 0.3s;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(4px);
      max-width: calc(100vw - 40px);
    }

    .server-tooltip .tooltiptext::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -6px;
      border-width: 6px;
      border-style: solid;
      border-color: rgba(31, 41, 55, 0.95) transparent transparent transparent;
    }

    .server-tooltip:hover .tooltiptext {
      visibility: visible;
      opacity: 1;
      bottom: 125%;
    }

    .server-tooltip:hover {
      color: #0027a2;
    }



    /* ===== Custom Dropdown: Simple Trigger + Modern Panel ===== */
    .custom-dropdown {
      position: relative;
      width: 100%;
      user-select: none;
    }

    /* Trigger box — same style as input */
    .dropdown-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 15px 16px;
      border: 2px solid rgba(0, 39, 162, 0.2);
      border-radius: 12px;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(5px);
      cursor: pointer;
      color: #374151;
      transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
      box-sizing: border-box;
    }

    .custom-dropdown.open .dropdown-trigger,
    .dropdown-trigger:focus {
      outline: none;
      border-color: #0027a2;
      box-shadow: 0 0 0 3px rgba(0, 39, 162, 0.1);
      background: rgba(255, 255, 255, 0.95);
    }

    .dropdown-selected-text {
      font-size: 16px;
      color: #374151;
      flex: 1;
    }

    .dropdown-arrow-svg {
      width: 16px;
      height: 16px;
      color: #6b7280;
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }

    .custom-dropdown.open .dropdown-arrow-svg {
      transform: rotate(180deg);
      color: #0027a2;
    }

    /* Panel list */
    .dropdown-panel {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 2px solid rgba(0, 39, 162, 0.3);
      border-radius: 12px;
      box-shadow: 0 16px 40px rgba(0, 39, 162, 0.15), 0 6px 12px rgba(0, 0, 0, 0.06);
      z-index: 200;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.25s ease,
        transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .custom-dropdown.open .dropdown-panel {
      max-height: 300px;
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .dropdown-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.2s ease;
    }

    .dropdown-option:not(:last-child) {
      border-bottom: 1px solid rgba(0, 39, 162, 0.08);
    }

    .dropdown-option:hover {
      background: linear-gradient(90deg, rgba(0, 39, 162, 0.07), rgba(118, 75, 162, 0.04));
      color: #0027a2;
      border-left-color: #0027a2;
      padding-left: 20px;
    }

    .dropdown-option.active {
      background: linear-gradient(90deg, rgba(0, 39, 162, 0.12), rgba(118, 75, 162, 0.07));
      color: #0027a2;
      border-left-color: #0027a2;
      font-weight: 700;
    }

    .dropdown-option-check {
      width: 14px;
      height: 14px;
      opacity: 0;
      color: #0027a2;
      transition: opacity 0.2s;
      flex-shrink: 0;
      margin-left: auto;
    }

    .dropdown-option.active .dropdown-option-check {
      opacity: 1;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      display: block;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 15px;
      border: 2px solid rgba(0, 39, 162, 0.2);
      border-radius: 12px;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.8);
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #0027a2;
      box-shadow: 0 0 0 3px rgba(0, 39, 162, 0.1);
      background: rgba(255, 255, 255, 0.95);
    }

    .connect-button {
      background: linear-gradient(135deg, #0027a2, #0056ff);
      color: white;
      padding: 15px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0, 39, 162, 0.4);
      position: relative;
      overflow: hidden;
      margin-top: 25px;
    }

    .connect-button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent);
      transition: all 0.5s ease;
    }

    .connect-button:hover::before {
      left: 100%;
    }

    .connect-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.5);
    }

    /* Hide/Show forms based on mode */
    .network-section {
      display: none;
    }

    .network-section.active {
      display: block;
    }

    .powered-by {
      margin-top: 10px;
      font-size: 14px;
      color: #6b7280;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      opacity: 0.8;
    }

    .powered-by .mini-logo {
      background: linear-gradient(135deg, #0027a2, #0056ff);
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f8f7fc;
    }

    /* ===== Responsive Breakpoints ===== */

    /* Mobile S: ≤360px */
    @media (max-width: 360px) {
      body {
        padding: 12px;
      }

      .container {
        border-radius: 16px;
        padding: 20px 14px;
      }

      h1 {
        font-size: 1.25rem;
      }

      .scan-button {
        font-size: 14px;
        padding: 12px 14px;
      }

      .connect-button {
        font-size: 14px;
        padding: 12px;
      }

      input[type="text"],
      input[type="password"] {
        font-size: 14px;
        padding: 12px;
      }

      .network-type-button {
        font-size: 12px;
        padding: 10px 8px;
      }

      .server-tooltip .tooltiptext {
        left: 0;
        transform: none;
        width: calc(100vw - 48px);
      }
    }

    /* Mobile M: 361px – 480px */
    @media (min-width: 361px) and (max-width: 480px) {
      body {
        padding: 16px;
      }

      .container {
        border-radius: 20px;
        padding: 24px 18px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .scan-button {
        font-size: 15px;
        padding: 13px 16px;
      }

      .server-tooltip .tooltiptext {
        left: 0;
        transform: none;
        width: calc(100vw - 64px);
      }
    }

    /* Tablet: 481px – 768px */
    @media (min-width: 481px) and (max-width: 768px) {
      body {
        padding: 24px;
      }

      .container {
        max-width: min(520px, 90vw);
        padding: 32px 28px;
        border-radius: 22px;
        margin: 0 auto;
      }

      h1 {
        font-size: 1.75rem;
      }

      .wifi-list {
        max-height: min(280px, 35vh);
      }
    }

    /* Laptop / Desktop: ≥769px */
    @media (min-width: 769px) {
      body {
        padding: 40px 20px;
      }

      .container {
        max-width: 480px;
        padding: 40px 36px;
        border-radius: 24px;
        margin: 0 auto;
        transition: box-shadow 0.3s ease;
      }

      .container:hover {
        box-shadow: 0 28px 56px rgba(0, 0, 0, 0.2);
      }

      h1 {
        font-size: 2rem;
      }

      .wifi-list {
        max-height: 280px;
      }

      input[type="text"],
      input[type="password"] {
        font-size: 15px;
      }

      .network-type-button {
        font-size: 15px;
      }
    }

    /* Large Desktop: ≥1200px */
    @media (min-width: 1200px) {
      body {
        padding: 60px 20px;
      }

      .container {
        max-width: 500px;
      }
    }

    /* Landscape Mobile (height terbatas) */
    @media (max-height: 600px) and (orientation: landscape) {
      body {
        align-items: flex-start;
        padding: 12px;
      }

      .container {
        padding: 16px 20px;
        animation: none;
      }

      h1 {
        font-size: 1.2rem;
        margin-bottom: 12px;
      }

      .wifi-list {
        max-height: 120px;
      }
    }

    /* Full-screen Loading Overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .loading-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 6px solid rgba(0, 39, 162, 0.1);
      border-top-color: #0027a2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    .loading-text {
      font-size: 1.25rem;
      font-weight: 700;
      color: #0027a2;
      text-align: center;
    }
    
    .loading-subtext {
      font-size: 0.95rem;
      color: #4b5563;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="full-loading" class="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Connecting to WiFi...</div>
    <div class="loading-subtext">Attempting to connect to your WiFi network. Please wait...</div>
  </div>

  <div class="container">
    <h1>MedLink Gateway Setup</h1>

    <!-- Network Type Toggle (Removed) -->
    <!-- WiFi Section -->
    <div id="wifi-section" class="network-section active">


      <div class="wifi-section">
        <button id="scan-wifi" class="scan-button">
          <span id="scan-text">🔍 Scan WiFi Networks</span>
          <div id="spinner" class="spinner" style="display: none"></div>
        </button>
        <div id="wifi-list" class="wifi-list"></div>
      </div>

      <div class="form-container">
        <!-- WiFi Configuration Form -->
        <form id="wifi-form" action="/save" method="POST" enctype="application/x-www-form-urlencoded">
          <input type="hidden" name="network_type" value="wifi">

          <!-- Server Host Removed -->

          <div class="input-group">
            <label for="wifi-ssid">📶 WiFi Name (SSID)</label>
            <input type="text" id="wifi-ssid" name="ssid" required placeholder="Enter WiFi network name" />
          </div>

          <div class="input-group">
            <label for="wifi-password">🔐 WiFi Password</label>
            <div class="password-container">
              <input type="password" id="wifi-password" name="password" required placeholder="Enter WiFi password" />
              <span class="password-toggle" onclick="togglePasswordVisibility('wifi-password', 'toggle-icon-1')">
                <svg id="toggle-icon-1" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
                  viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              </span>
            </div>
          </div>

          <!-- IP Mode Selection Dropdown -->
          <div class="input-group">
            <label for="wifi-ip-mode">⚙️ IP Settings</label>
            <select id="wifi-ip-mode" name="ip_mode" required class="custom-select">
              <option value="dynamic">Automatic IP (DHCP)</option>
              <option value="static">Static IP (Manual)</option>
            </select>
          </div>

          <!-- Static IP Fields (Hidden by default) -->
          <div id="wifi-static-fields" style="display: none;">
            <div class="input-group">
              <label for="wifi-ip-address">🌐 IP Address</label>
              <input type="text" id="wifi-ip-address" name="ip_address" placeholder="ex: 192.168.1.100"
                pattern="^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$" />
            </div>
            <div class="input-group">
              <label for="wifi-subnet-mask">🔒 Subnet Mask</label>
              <input type="text" id="wifi-subnet-mask" name="subnet_mask" placeholder="ex: 255.255.255.0"
                pattern="^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$" />
            </div>
            <div class="input-group">
              <label for="wifi-gateway">🚪 Gateway Address</label>
              <input type="text" id="wifi-gateway" name="gateway" placeholder="ex: 192.168.1.1"
                pattern="^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$" />
            </div>
          </div>

          <div style="text-align: center; margin: 25px 0 15px; border-bottom: 1px solid rgba(0, 39, 162, 0.2); line-height: 0.1em;">
            <span style="background:#fff; padding:0 10px; color:#0027a2; font-weight:600; font-size: 14px;">FTP Server Settings</span>
          </div>

          <div class="input-group">
            <label for="ftp-host">📡 FTP Server Host / IP</label>
            <input type="text" id="ftp-host" name="ftp_host" required
                   placeholder="ex: 192.168.1.10" />
          </div>

          <div class="input-group">
            <label for="ftp-port">🔌 FTP Port</label>
            <input type="text" id="ftp-port" name="ftp_port" required
                   value="21" placeholder="21" />
          </div>

          <div class="input-group">
            <label for="ftp-user">👤 FTP Username</label>
            <input type="text" id="ftp-user" name="ftp_user" required
                   placeholder="ex: ftpuser" />
          </div>

          <div class="input-group">
            <label for="ftp-pass">🔐 FTP Password</label>
            <div class="password-container">
              <input type="password" id="ftp-pass" name="ftp_pass" required placeholder="Enter FTP password" />
              <span class="password-toggle" onclick="togglePasswordVisibility('ftp-pass', 'toggle-icon-ftp')">
                <svg id="toggle-icon-ftp" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
                  viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              </span>
            </div>
          </div>

          <button type="submit" id="save-btn" class="connect-button">
            Save & Connect
          </button>
        </form>
      </div>

  <script>
    const ipRegex = /^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;

    // IP Mode Dropdown (WiFi): show/hide static fields
    document.getElementById('wifi-ip-mode').addEventListener('change', function () {
      var staticFields = document.getElementById('wifi-static-fields');
      var isStatic = this.value === 'static';
      staticFields.style.display = isStatic ? 'block' : 'none';
      staticFields.querySelectorAll('input').forEach(function (input) {
        if (isStatic) input.setAttribute('required', '');
        else input.removeAttribute('required');
      });
    });

    // WiFi selection functionality
    function selectWiFi(ssid) {
      document.getElementById('wifi-ssid').value = ssid;
    }

    // Fungsi untuk menampilkan error message
    function showErrorMessage(message, ssid = "") {
      const existingError = document.querySelector(".error-message");
      if (existingError) {
        existingError.remove();
      }

      const errorDiv = document.createElement("div");
      errorDiv.className = "error-message";
      errorDiv.style.cssText = `
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #dc2626;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #fca5a5;
            text-align: center;
            font-weight: 600;
            animation: slideIn 0.3s ease-out;
        `;
      errorDiv.innerHTML = `❌ ${message}`;

      const visibleContainer = document.querySelector(".form-container");
      visibleContainer.parentNode.insertBefore(errorDiv, visibleContainer);

      if (ssid) {
        document.getElementById('wifi-ssid').value = ssid;
      }

      setTimeout(() => {
        if (errorDiv.parentNode) {
          errorDiv.style.animation = "slideOut 0.3s ease-in";
          setTimeout(() => errorDiv.remove(), 300);
        }
      }, 10000);
    }

    // Fungsi untuk menampilkan success message
    function showSuccessMessage(message) {
      const existingSuccess = document.querySelector(".success-message");
      if (existingSuccess) {
        existingSuccess.remove();
      }

      const successDiv = document.createElement("div");
      successDiv.className = "success-message";
      successDiv.style.cssText = `
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            color: #065f46;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #6ee7b7;
            text-align: center;
            font-weight: 600;
        `;
      successDiv.innerHTML = `✅ ${message}`;

      const visibleContainer = document.querySelector(".form-container");
      visibleContainer.parentNode.insertBefore(successDiv, visibleContainer);
    }

    // CSS untuk animasi
    const style = document.createElement("style");
    style.textContent = `
        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-20px); opacity: 0; }
        }
    `;
    document.head.appendChild(style);

    document
      .getElementById("scan-wifi")
      .addEventListener("click", async () => {
        const scanButton = document.getElementById("scan-wifi");
        const scanText = document.getElementById("scan-text");
        const spinner = document.getElementById("spinner");
        const wifiList = document.getElementById("wifi-list");

        scanButton.disabled = true;
        scanText.textContent = "🔄 Scanning WiFi Networks...";
        spinner.style.display = "inline-block";
        wifiList.style.display = "none";
        wifiList.innerHTML = "";

        try {
          const response = await fetch("/scan");
          const networks = await response.json();

          if (networks.length === 0) {
            wifiList.innerHTML =
              '<div style="color: #6b7280; text-align: center; padding: 20px;">📡 No networks found. Try again!</div>';
          } else {
            const uniqueNetworks = removeDuplicateNetworks(networks);

            uniqueNetworks.forEach((network) => {
              const signalBars = createSignalBars(network.rssi);
              const div = document.createElement("div");
              div.className = "wifi-item";
              div.innerHTML = `
                    <div style="display: flex; flex-direction: column; flex-grow: 1;">
                        <span class="wifi-name">${network.ssid}</span>
                        <small style="color: #6b7280; font-size: 12px;">${network.rssi} dBm</small>
                    </div>
                    <div class="signal-icon">${signalBars}</div>
                `;
              div.addEventListener("click", () => {
                selectWiFi(network.ssid);
                wifiList.style.display = "none";

                // Animation feedback
                div.style.background = "rgba(16, 185, 129, 0.2)";
                div.style.transform = "scale(1.02)";
                setTimeout(() => {
                  div.style.background = "rgba(255, 255, 255, 0.5)";
                  div.style.transform = "scale(1)";
                }, 300);
              });
              wifiList.appendChild(div);
            });
          }
          wifiList.style.display = "block";
        } catch (error) {
          wifiList.innerHTML =
            '<div style="color: #ef4444; text-align: center; padding: 20px;">❌ Error scanning networks. Please try again.</div>';
          wifiList.style.display = "block";
        } finally {
          scanButton.disabled = false;
          scanText.textContent = "🔍 Scan WiFi Networks";
          spinner.style.display = "none";
        }
      });

    // Fungsi untuk mendapatkan level signal strength
    function getSignalLevel(rssi) {
      if (rssi > -50) return 4; // Excellent
      if (rssi > -60) return 3; // Good
      if (rssi > -70) return 2; // Fair
      if (rssi > -80) return 1; // Weak
      return 0; // Very weak/No signal
    }

    // Fungsi untuk menghapus duplikasi berdasarkan SSID
    function removeDuplicateNetworks(networks) {
      const uniqueNetworks = [];
      const seenSSIDs = new Set();

      // Sort berdasarkan signal strength (RSSI tertinggi dulu)
      networks.sort((a, b) => b.rssi - a.rssi);

      networks.forEach((network) => {
        // Skip jika SSID kosong atau sudah ada
        if (
          !network.ssid ||
          network.ssid.trim() === "" ||
          seenSSIDs.has(network.ssid)
        ) {
          return;
        }

        seenSSIDs.add(network.ssid);
        uniqueNetworks.push(network);
      });

      return uniqueNetworks;
    }

    // Form submission handler
    document.getElementById("wifi-form").addEventListener("submit", async function (e) {
      e.preventDefault();

      const ssidInput = document.getElementById("wifi-ssid");
      const passwordInput = document.getElementById("wifi-password");
      const ipModeSelect = document.getElementById("wifi-ip-mode");
      const submitButton = this.querySelector(".connect-button");
      const isStatic = ipModeSelect.value === 'static';

      // Common validations
      if (!ssidInput.value) {
        showErrorMessage("WiFi name (SSID) cannot be empty!");
        return;
      }
      if (ssidInput.value.length > 31) {
        showErrorMessage("WiFi name (SSID) must be 31 characters or less!");
        return;
      }
      if (passwordInput.value.length < 8) {
        showErrorMessage("WiFi password must be at least 8 characters!");
        return;
      }
      if (passwordInput.value.length > 63) {
        showErrorMessage("WiFi password must be 63 characters or less!");
        return;
      }

      // Static-only validations
      if (isStatic) {
        const ipInput = document.getElementById("wifi-ip-address");
        const subnetInput = document.getElementById("wifi-subnet-mask");
        const gatewayInput = document.getElementById("wifi-gateway");
        if (!ipInput.value || !ipRegex.test(ipInput.value)) {
          showErrorMessage("Please enter a valid IP address!");
          return;
        }
        if (!subnetInput.value || !ipRegex.test(subnetInput.value)) {
          showErrorMessage("Please enter a valid subnet mask!");
          return;
        }
        if (!gatewayInput.value || !ipRegex.test(gatewayInput.value)) {
          showErrorMessage("Please enter a valid gateway address!");
          return;
        }
      }

      await submitForm(this, submitButton, "🔄 Connecting...", "💾 Save & Connect");
    });

    async function submitForm(form, submitButton, loadingText, originalText) {
      submitButton.innerHTML = loadingText;
      submitButton.disabled = true;
      
      const overlay = document.getElementById('full-loading');
      if (overlay) overlay.classList.add('active');

      try {
        const response = await fetch("/save", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded"
          },
          body: new URLSearchParams(new FormData(form)).toString()
        });
        const data = await response.json();

        if (data.status === "success") {
          if (overlay) {
             overlay.querySelector('.loading-text').innerHTML = "Connected!";
             overlay.querySelector('.loading-subtext').innerHTML = "WiFi connection successful. Settings have been updated.";
             overlay.querySelector('.loading-spinner').style.display = "none";
          }
          showSuccessMessage(data.message);
        } else {
          if (overlay) overlay.classList.remove('active');
          showErrorMessage(data.message, data.ssid);
        }
      } catch (error) {
        if (overlay) overlay.classList.remove('active');
        showErrorMessage("Failed to connect to the device. Please try again!");
      } finally {
        submitButton.innerHTML = originalText;
        submitButton.disabled = false;
      }
    }

    const inputs = document.querySelectorAll(
      'input[type="text"], input[type="password"]'
    );
    inputs.forEach((input) => {
      input.addEventListener("input", function () {
        if (this.value.length > 0) {
          this.style.borderColor = "#10b981";
        } else {
          this.style.borderColor = "rgba(0, 39, 162, 0.2)";
        }
      });
    });
    function togglePasswordVisibility(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
      }
    }

    // ===== Custom Dropdown: Modern List Panel =====
    function initCustomDropdowns() {
      document.querySelectorAll('select.custom-select').forEach(function (select) {
        var dropdown = document.createElement('div');
        dropdown.className = 'custom-dropdown';

        var trigger = document.createElement('div');
        trigger.className = 'dropdown-trigger';
        trigger.setAttribute('role', 'button');
        trigger.setAttribute('tabindex', '0');

        var selectedText = document.createElement('span');
        selectedText.className = 'dropdown-selected-text';
        selectedText.textContent = select.options[select.selectedIndex] ? select.options[select.selectedIndex].text : '';

        var arrowSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        arrowSvg.setAttribute('class', 'dropdown-arrow-svg');
        arrowSvg.setAttribute('viewBox', '0 0 24 24');
        arrowSvg.setAttribute('fill', 'none');
        arrowSvg.setAttribute('stroke', 'currentColor');
        arrowSvg.setAttribute('stroke-width', '2');
        arrowSvg.setAttribute('stroke-linecap', 'round');
        arrowSvg.setAttribute('stroke-linejoin', 'round');
        arrowSvg.innerHTML = '<polyline points="6 9 12 15 18 9"/>';

        trigger.appendChild(selectedText);
        trigger.appendChild(arrowSvg);

        var panel = document.createElement('div');
        panel.className = 'dropdown-panel';
        panel.setAttribute('role', 'listbox');

        Array.from(select.options).forEach(function (opt) {
          var item = document.createElement('div');
          item.className = 'dropdown-option' + (opt.selected ? ' active' : '');
          item.setAttribute('role', 'option');
          item.dataset.value = opt.value;

          var lbl = document.createElement('span');
          lbl.textContent = opt.text;

          var chk = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          chk.setAttribute('class', 'dropdown-option-check');
          chk.setAttribute('viewBox', '0 0 24 24');
          chk.setAttribute('fill', 'none');
          chk.setAttribute('stroke', 'currentColor');
          chk.setAttribute('stroke-width', '2.5');
          chk.setAttribute('stroke-linecap', 'round');
          chk.setAttribute('stroke-linejoin', 'round');
          chk.innerHTML = '<polyline points="20 6 9 18 4 13"/>';

          item.appendChild(lbl);
          item.appendChild(chk);

          item.addEventListener('click', function () {
            select.value = opt.value;
            select.dispatchEvent(new Event('change'));
            selectedText.textContent = opt.text;
            panel.querySelectorAll('.dropdown-option').forEach(function (o) { o.classList.remove('active'); });
            item.classList.add('active');
            dropdown.classList.remove('open');
          });

          panel.appendChild(item);
        });

        dropdown.appendChild(trigger);
        dropdown.appendChild(panel);

        // Hide native select, keep for form submission
        select.style.cssText = 'position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;';
        select.parentNode.insertBefore(dropdown, select);

        // Toggle open/close
        trigger.addEventListener('click', function (e) {
          e.stopPropagation();
          var isOpen = dropdown.classList.contains('open');
          document.querySelectorAll('.custom-dropdown.open').forEach(function (d) { d.classList.remove('open'); });
          if (!isOpen) dropdown.classList.add('open');
        });

        // Keyboard support
        trigger.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') { trigger.click(); e.preventDefault(); }
          if (e.key === 'Escape') dropdown.classList.remove('open');
        });
      });

      // Close on outside click
      document.addEventListener('click', function () {
        document.querySelectorAll('.custom-dropdown.open').forEach(function (d) { d.classList.remove('open'); });
      });
    }

    initCustomDropdowns();

    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      const errorMsg = urlParams.get('error');
      if (errorMsg) {
        // Map common error codes to user-friendly messages
        let displayMsg = decodeURIComponent(errorMsg);
        if (errorMsg === 'wifi_failed') {
          displayMsg = 'Failed to connect to WiFi. Please check your credentials and try again.';
        } else if (errorMsg === 'ftp_failed') {
          displayMsg = 'WiFi connected, but FTP connection failed. Please check FTP credentials.';
        }
        showErrorMessage(displayMsg);
      }
    };
  </script>
